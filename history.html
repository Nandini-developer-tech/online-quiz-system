<!DOCTYPE html>
<html>
<head>
    <title>Quiz History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h2>Quiz History</h2>

    <table>

        <tr>
            <th>Subject</th>
            <th>Score</th>
            <th>Date</th>
        </tr>

        {% for r in results %}

        <tr>

            <td>{{ r.subject_name }}</td>

            <td>{{ r.score }}</td>

            <td>{{ r.quiz_date }}</td>

        </tr>

        {% endfor %}

    </table>

    <br>

    <a href="/subjects">
        Back
    </a>

</div>

</body>
</html>
